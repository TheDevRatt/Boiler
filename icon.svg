<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33556e"/>
      <stop offset="1" stop-color="#151a20"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b7c4cf"/>
      <stop offset="0.5" stop-color="#f4f8fb"/>
      <stop offset="1" stop-color="#93a4b1"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b5762c"/>
      <stop offset="0.5" stop-color="#f6c87e"/>
      <stop offset="1" stop-color="#a86a24"/>
    </linearGradient>
    <radialGradient id="flame" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffd54a"/>
      <stop offset="0.55" stop-color="#ff8a2a"/>
      <stop offset="1" stop-color="#ff8a2a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="256" height="256" rx="56" fill="url(#bg)"/>

  <!-- steam -->
  <g fill="#ffffff">
    <g opacity="0.9">
      <circle cx="110" cy="54" r="15"/>
      <circle cx="132" cy="45" r="19"/>
      <circle cx="154" cy="55" r="14"/>
      <circle cx="128" cy="63" r="17"/>
    </g>
    <g opacity="0.35">
      <circle cx="150" cy="33" r="8"/>
      <circle cx="106" cy="38" r="6"/>
    </g>
  </g>

  <!-- flame glow under the boiler -->
  <ellipse cx="128" cy="210" rx="52" ry="18" fill="url(#flame)"/>

  <!-- legs -->
  <path d="M95 190 l-10 30 h18 z" fill="#546572"/>
  <path d="M161 190 l10 30 h-18 z" fill="#546572"/>

  <!-- dome cap -->
  <rect x="112" y="70" width="32" height="20" rx="7" fill="url(#brass)"/>

  <!-- tank -->
  <rect x="74" y="86" width="108" height="116" rx="30" fill="url(#steel)" stroke="#6f8b90" stroke-width="3"/>

  <!-- brass bands -->
  <rect x="72" y="104" width="112" height="12" rx="4" fill="url(#brass)"/>
  <rect x="72" y="176" width="112" height="12" rx="4" fill="url(#brass)"/>

  <!-- pressure gauge -->
  <g>
    <circle cx="128" cy="146" r="31" fill="#ffffff" stroke="#a86a24" stroke-width="5"/>
    <path d="M107 162 A25 25 0 1 1 149 162" fill="none" stroke="#c2ccd3" stroke-width="3"/>
    <path d="M141 126 A25 25 0 0 1 149 162" fill="none" stroke="#e74c3c" stroke-width="4"/>
    <line x1="128" y1="146" x2="146" y2="129" stroke="#141a20" stroke-width="4" stroke-linecap="round"/>
    <circle cx="128" cy="146" r="4.5" fill="#141a20"/>
  </g>
</svg>
